# EDFS v2 - Docker Compose (optional, not required for local dev)
# Usage: docker-compose up
# Note: Everything runs fine without Docker via:
#   uvicorn src.api.main:app --reload --port 8000
#   python -m src.data.scheduler

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    env_file: ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    env_file: ../.env
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
